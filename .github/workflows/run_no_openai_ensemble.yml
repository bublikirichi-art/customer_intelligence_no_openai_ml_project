name: Run No-OpenAI ML Ensemble

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run no-OpenAI ensemble
        run: |
          python src/build_no_openai_ensemble.py

      - name: Validate submission
        run: |
          python src/validate_submission.py outputs/submission_no_openai_ensemble.csv data/test.csv

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: no-openai-ml-ensemble-outputs
          path: |
            outputs/*.csv
            outputs/*.json
